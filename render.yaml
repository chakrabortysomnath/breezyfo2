services:
  # Backend — FastAPI
  - type: web
    name: fo-trading-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    timeout: 60
    envVars:
      - key: BREEZE_API_KEY
        sync: false
      - key: BREEZE_API_SECRET
        sync: false
      - key: BREEZE_SESSION_TOKEN
        sync: false
      - key: QUOTAGUARD_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: BACKEND_URL
        sync: false

  # Frontend — Streamlit
  - type: web
    name: fo-trading-frontend
    runtime: python
    rootDir: frontend
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    timeout: 60
    envVars:
      - key: API_BASE_URL
        sync: false
